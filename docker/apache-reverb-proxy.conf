# Proxy WebSocket connections to Reverb (port 8080)
# This must be loaded BEFORE the default vhost config

<IfModule mod_proxy.c>
    <IfModule mod_proxy_wstunnel.c>
        # Forward /app/* WebSocket connections to Reverb
        ProxyPass /app/ ws://localhost:8080/app/
        ProxyPassReverse /app/ ws://localhost:8080/app/

        # Also handle HTTP requests to /app/* (Pusher protocol handshake)
        ProxyPass /apps/ http://localhost:8080/apps/
        ProxyPassReverse /apps/ http://localhost:8080/apps/
    </IfModule>
</IfModule>
